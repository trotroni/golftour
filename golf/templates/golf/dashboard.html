{% load static %}

<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golf Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'dashboard.css' %}">
</head>

<body>

<div class="container">

    <div class="header">
        <h1 class="title">Golf Match Jours {{ days }}</h1>
    </div>

    <div class="card">
        <table>
            <thead>
            <tr>
                <th>Trou</th>
                <th>T1</th>
                <th></th>
                <th>T2</th>
            </tr>
            </thead>

            <tbody>
            {% for hole in holes %}
            <tr>
                <td class="hole">N°{{ hole }}</td>
                <td class="grey">1</td>
                <td>-</td>
                <td class="red">0</td>
            </tr>
            {% endfor %}
            </tbody>

        </table>
    </div>

</div>

</body>
</html>
