{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initialisation du tournoi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'golf.css' %}">
</head>
<body>
<main class="main">
<div class="setup-page">
    <div class="setup-header">
        <div class="setup-logo">⛳</div>
        <h1>Golf Tournament</h1>
        <p>Configure ton tournoi avant de commencer</p>
    </div>

    <form method="post" class="setup-form">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label">Nom du tournoi</label>
            <input type="text" name="name" value="Golf Tournament" class="form-input" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Nombre de jours</label>
                <input type="number" name="num_days" value="3" min="1" max="10" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">Trous par journée</label>
                <input type="number" name="num_holes" value="18" min="1" max="18" class="form-input">
            </div>
        </div>

        <div class="setup-info">
            <p>👤 <strong>Équipe 1 (USA) :</strong> J1, J2 (Groupe 1) + J3 (Groupe 2)</p>
            <p>👤 <strong>Équipe 2 (EUR) :</strong> J4 (Groupe 1) + J5 (Groupe 2)</p>
            <p class="setup-note">Tu pourras renommer joueurs et équipes dans les réglages.</p>
        </div>

        <button type="submit" class="btn btn-primary btn-large btn-full">
            🚀 Créer le tournoi
        </button>
    </form>
</div>
</main>
</body>
</html>
